<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 測速照相偵測工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite/dist/tf-tflite.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; }
        #status { position: absolute; top: 15px; z-index: 20; color: #00ffcc; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 20px; font-size: 13px; }
        #controls { position: absolute; top: 60px; z-index: 20; display: flex; flex-direction: column; gap: 8px; width: 80%; max-width: 300px; }
        select, input, button.tool-btn { padding: 10px; border-radius: 8px; border: none; font-size: 14px; width: 100%; }
        .cam-container { position: relative; width: 100%; max-width: 640px; background: #000; }
        video { width: 100%; height: auto; display: block; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; }
        #startBtn { position: absolute; bottom: 30px; z-index: 30; padding: 15px 40px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">準備中...</div>

    <div id="controls">
        <label style="font-size:12px;">1. 選擇模型檔案 (.tflite)</label>
        <input type="file" id="modelUpload" accept=".tflite">
        
        <label style="font-size:12px;">2. 選擇解碼格式</label>
        <select id="formatSelect">
            <option value="mediapipe" selected>MediaPipe Model Maker</option>
            <option value="yolo">YOLO (v8/v11)</option>
        </select>

        <select id="cameraSelect" onchange="changeCamera()" style="display:none;"></select>
    </div>

    <div class="cam-container">
        <video id="webcam" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>

    <button id="startBtn" onclick="startApp()">啟動 AI 分析</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const modelUpload = document.getElementById('modelUpload');
        const formatSelect = document.getElementById('formatSelect');
        const cameraSelect = document.getElementById('cameraSelect');
        const startBtn = document.getElementById('startBtn');

        let tfliteModel = null;
        let currentStream = null;
        let inputShape = [224, 224];

        // 標籤映射表 (依據你的 class_map.txt)
        const classMap = {
            0: "前方有測速照相",
            // 如果有更多類別 c1, c2... 可以在此增加
        };

        async function startApp() {
            let modelSource;
            
            if (modelUpload.files[0]) {
                modelSource = URL.createObjectURL(modelUpload.files[0]);
            } else {
                // 如果沒上傳，預設抓取根目錄的 model.tflite
                modelSource = './model.tflite'; 
                statusDiv.innerText = "嘗試載入預設模型...";
            }

            startBtn.disabled = true;
            try {
                tfliteModel = await tflite.loadTFLiteModel(modelSource);
                if (tfliteModel.inputs && tfliteModel.inputs[0]) {
                    inputShape = [tfliteModel.inputs[0].shape[1], tfliteModel.inputs[0].shape[2]];
                }

                statusDiv.innerText = "模型就緒，啟動鏡頭...";
                await setupCamera();
                await populateCameraList();

                document.getElementById('controls').style.display = 'none';
                startBtn.style.display = 'none';
                video.play();
                predictLoop();
            } catch (err) {
                statusDiv.innerText = "載入失敗，請檢查檔案或路徑";
                console.error(err);
                startBtn.disabled = false;
            }
        }

        async function setupCamera(deviceId = null) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            const constraints = { video: { deviceId: deviceId ? { exact: deviceId } : undefined, facingMode: 'environment' } };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            return new Promise(res => video.onloadedmetadata = res);
        }

        async function populateCameraList() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(d => d.kind === 'videoinput');
            cameraSelect.style.display = 'block';
            cameraSelect.innerHTML = "";
            videoDevices.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.deviceId;
                opt.text = d.label || "攝影機";
                cameraSelect.appendChild(opt);
            });
        }

        async function changeCamera() {
            await setupCamera(cameraSelect.value);
            video.play();
        }

        async function predictLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && tfliteModel) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const imgTensor = tf.tidy(() => {
                    return tf.browser.fromPixels(video).resizeNearestNeighbor(inputShape).expandDims(0).toFloat().div(255.0);
                });

                const result = await tfliteModel.predict(imgTensor);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const outputs = Object.values(result);
                const format = formatSelect.value;

                if (format === 'mediapipe' && outputs.length >= 3) {
                    // MediaPipe SSD 解析: [ymin, xmin, ymax, xmax]
                    const boxes = outputs[0].dataSync();
                    const classes = outputs[1].dataSync();
                    const scores = outputs[2].dataSync();
                    for (let i = 0; i < scores.length; i++) {
                        if (scores[i] > 0.45) {
                            const ymin = boxes[i*4], xmin = boxes[i*4+1], ymax = boxes[i*4+2], xmax = boxes[i*4+3];
                            drawUI(xmin * canvas.width, ymin * canvas.height, (xmax-xmin)*canvas.width, (ymax-ymin)*canvas.height, classes[i], scores[i]);
                        }
                    }
                } else if (format === 'yolo') {
                    // YOLO 解析 (假設輸出 [1, 5+N, 8400])
                    const data = outputs[0].dataSync();
                    const dims = outputs[0].shape[1];
                    const preds = outputs[0].shape[2];
                    for (let i = 0; i < preds; i += 2) {
                        let maxS = 0, cls = 0;
                        for (let c = 4; c < dims; c++) {
                            if (data[c*preds+i] > maxS) { maxS = data[c*preds+i]; cls = c-4; }
                        }
                        if (maxS > 0.5) {
                            const cx = data[i], cy = data[preds+i], w = data[2*preds+i], h = data[3*preds+i];
                            drawUI((cx-w/2)*canvas.width, (cy-h/2)*canvas.height, w*canvas.width, h*canvas.height, cls, maxS);
                        }
                    }
                }

                imgTensor.dispose();
                outputs.forEach(t => t.dispose());
            }
            requestAnimationFrame(predictLoop);
        }

        function drawUI(x, y, w, h, id, score) {
            ctx.strokeStyle = "#FF3300"; // 警示紅色
            ctx.lineWidth = 4;
            ctx.strokeRect(x, y, w, h);
            const label = classMap[Math.round(id)] || `未知物體 ${id}`;
            const txt = `${label} ${Math.round(score*100)}%`;
            ctx.fillStyle = "#FF3300";
            ctx.font = "bold 20px Arial";
            ctx.fillText(txt, x, y > 30 ? y - 10 : y + 25);
            statusDiv.innerText = "偵測中: " + label;
        }
    </script>
</body>
</html>
