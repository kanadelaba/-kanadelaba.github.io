<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機鏡頭 AI 即時分析 (TFLite 版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite/dist/tf-tflite.min.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #status {
            position: absolute;
            top: 20px;
            z-index: 20;
            color: #00ffcc;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
        }

        #selectContainer {
            position: absolute;
            top: 70px;
            z-index: 20;
            display: none;
        }

        select {
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .cam-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            height: auto;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #000;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        button {
            position: absolute;
            bottom: 40px;
            z-index: 30;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: background 0.3s;
        }
        
        button:disabled {
            background-color: #555;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="status">等待啟動...</div>

    <div id="selectContainer">
        <select id="cameraSelect" onchange="changeCamera()"></select>
    </div>

    <div class="cam-container">
        <video id="webcam" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
    </div>

    <button id="startBtn" onclick="startApp()">開啟相機並分析 (TFLite)</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const selectContainer = document.getElementById('selectContainer');
        const cameraSelect = document.getElementById('cameraSelect');
        
        let tfliteModel = null;
        let currentStream = null;

        // 這裡設定你的模型路徑 (相對於 index.html)
        const MODEL_PATH = './models/model.tflite';

        async function startApp() {
            startBtn.disabled = true;
            statusDiv.innerText = "正在初始化 TFLite 模型...";
            
            try {
                // 載入 TFLite 模型
                tfliteModel = await tflite.loadTFLiteModel(MODEL_PATH);
                statusDiv.innerText = "模型載入完成，正在請求相機...";
                
                await setupCamera();
                await populateCameraList();
                
                selectContainer.style.display = 'block';
                startBtn.style.display = 'none';
                
                video.play();
                statusDiv.innerText = "正在分析中...";
                predictLoop();

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "載入失敗: " + err.message + " (請確認模型路徑是否正確)";
                startBtn.disabled = false;
            }
        }

        async function setupCamera(deviceId = null) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                audio: false,
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    facingMode: deviceId ? undefined : 'environment',
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            currentStream = stream;
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        async function populateCameraList() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            cameraSelect.innerHTML = "";
            videoDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                const label = device.label || `攝影機 ${index + 1}`;
                option.text = label.includes('back') ? `📷 後置：${label}` : `👤 前置：${label}`;
                cameraSelect.appendChild(option);
            });
        }

        async function changeCamera() {
            const deviceId = cameraSelect.value;
            statusDiv.innerText = "切換鏡頭中...";
            try {
                await setupCamera(deviceId);
                video.play();
                statusDiv.innerText = "繼續分析";
            } catch (err) {
                statusDiv.innerText = "切換失敗: " + err.message;
            }
        }

        function predictLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && tfliteModel) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // 將影像轉為 Tensor
                const imgTensor = tf.browser.fromPixels(video);
                
                // TFLite 預測
                // 注意：這裡的輸出格式取決於你的模型訓練方式（如 YOLO 或 SSD）
                // 以下為通用範例，具體解析需對應你的模型輸出層
                const prediction = tfliteModel.predict(imgTensor.expandDims(0));
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 這裡示範獲取結果 (需根據你的模型 Output 索引修改)
                // 如果是自定義模型，通常需要處理 prediction 的數據
                // console.log(prediction); 

                imgTensor.dispose(); // 釋放記憶體
            }
            requestAnimationFrame(predictLoop);
        }
    </script>
</body>
</html>
